<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ETF淨值計算器</title>
    <style>
      :root {
        --bg-color: #0b0e14;
        --card-bg: #151a22;
        --border-color: #2a313e;
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --up-color: #ef4444;
        --down-color: #22c55e;
        --flat-color: #e2e8f0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        box-sizing: border-box;
      }

      .container {
        background: var(--card-bg);
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 1.5rem;
        text-align: center;
        color: #fff;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        padding: 0.875rem 1rem;
        background-color: #0b0e14;
        border: 1px solid var(--border-color);
        color: #fff;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .input-group {
        display: flex;
        gap: 0.5rem;
      }

      .input-group input {
        flex: 1;
      }

      .btn-select {
        width: auto;
        background-color: #1e293b;
        cursor: pointer;
        color: #e2e8f0;
        transition: opacity 0.2s;
      }

      button {
        width: 100%;
        padding: 0.875rem;
        background-color: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background-color 0.3s ease, transform 0.1s ease,
          color 0.3s ease;
      }

      button:hover {
        background-color: var(--accent-hover);
      }

      button:disabled:not(.btn-saved) {
        background-color: #475569;
        cursor: not-allowed;
      }

      .btn-danger {
        background-color: #fe6e6e;
        color: #ffffff;
        border: none;
      }

      .btn-saved {
        background-color: var(--down-color) !important;
        transform: scale(0.98);
        cursor: default !important;
      }

      .result {
        margin-top: 1.5rem;
        padding: 1.5rem;
        background: linear-gradient(145deg, #1e293b, #0f172a);
        border-radius: 12px;
        text-align: center;
        border: 1px solid var(--border-color);
      }

      .result-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }

      .result-value {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--flat-color);
        margin-top: 0.25rem;
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 10px;
      }

      .percent-change {
        font-size: 1rem;
        font-weight: 500;
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
      }

      .header-actions {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      .card {
        background: #1e2532;
        border: 1px solid var(--border-color);
        padding: 1.25rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
      }

      .card-title {
        font-size: 0.75rem;
        font-weight: 700;
        margin-bottom: 1.25rem;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .is-up {
        color: var(--up-color);
      }
      .is-up .percent-change {
        background: rgba(239, 68, 68, 0.1);
      }
      .is-down {
        color: var(--down-color);
      }
      .is-down .percent-change {
        background: rgba(34, 197, 94, 0.1);
      }

      .toggle-icon {
        background-color: transparent;
        color: var(--text-muted);
        width: auto;
        padding: 0;
        margin: 0;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.3s ease, color 0.2s;
      }

      .toggle-icon:hover {
        background-color: transparent;
        color: var(--text-main);
      }

      .toggle-icon.collapsed {
        transform: rotate(-90deg);
      }

      .content-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ETF 淨值計算器</h1>

      <div class="header-actions">
        <select id="etfSelector"></select>
        <button id="addBtn" style="width: 70px; margin-top: 0">+</button>
        <button
          id="deleteBtn"
          class="btn-danger"
          style="width: 70px; margin-top: 0"
        >
          -
        </button>
      </div>

      <div class="card">
        <div class="card-title">
          <span>基準設定</span>
          <button id="toggleBaseSettingsBtn" class="toggle-icon">▼</button>
        </div>

        <div id="baseSettingsContent">
          <div class="form-group">
            <label for="baseIndex">指數點數</label>
            <input
              type="number"
              id="baseIndex"
              step="any"
              placeholder="請輸入基準點數"
            />
          </div>
          <div class="form-group">
            <label for="baseNav">ETF 淨值</label>
            <input
              type="number"
              id="baseNav"
              step="any"
              placeholder="請輸入對應淨值"
            />
          </div>
          <button id="saveBaseBtn">儲存基準</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">淨值試算</div>
        <div class="form-group">
          <label for="targetIndex">輸入或自動帶入</label>
          <div class="input-group">
            <input
              type="number"
              id="targetIndex"
              step="any"
              placeholder="請輸入"
            />
            <select id="quickFetch" class="btn-select">
              <option value="">自動帶入 ▼</option>
              <option value="TX">台指期</option>
              <option value="NQ">納斯達克期貨</option>
              <option value="ES">標普500期貨</option>
            </select>
          </div>
        </div>

        <div class="result">
          <div class="result-label">預估 ETF 淨值</div>
          <div class="result-value" id="resultNav">
            0.00 <span class="percent-change">(0.00%)</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const GOOGLE_SHEET_CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnYJSfjaXfVeuMEPQZOCrsF7MgXxjApdoP9AFnWlVHq2IrE0-EUO-oRHojhPq5wlIjtdoSUYA7XqsC/pub?output=csv";

      // ETF 對應的自動抓取指數字典
      const etfIndexMapping = {
        "00675L": "TX",
        "00632R": "TX",
        "00671R": "NQ",
        "00670L": "NQ",
        "00647L": "ES",
      };

      let etfs = JSON.parse(localStorage.getItem("etfs")) || [
        {
          id: "00671R",
          name: "00671R (反1)",
          multiplier: -1,
          baseIndex: 24780,
          baseNav: 2.92,
        },
      ];
      let currentEtfId = localStorage.getItem("currentEtfId") || etfs[0].id;

      const selector = document.getElementById("etfSelector");
      const addBtn = document.getElementById("addBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const baseIndexInput = document.getElementById("baseIndex");
      const baseNavInput = document.getElementById("baseNav");
      const saveBaseBtn = document.getElementById("saveBaseBtn");
      const targetIndexInput = document.getElementById("targetIndex");
      const resultNav = document.getElementById("resultNav");
      const quickFetch = document.getElementById("quickFetch");

      const toggleBaseSettingsBtn = document.getElementById(
        "toggleBaseSettingsBtn"
      );
      const baseSettingsContent = document.getElementById(
        "baseSettingsContent"
      );

      let isBaseSettingsCollapsed =
        localStorage.getItem("isBaseSettingsCollapsed") === "true";

      function init() {
        renderSelector();
        loadCurrentEtf();
        applyBaseSettingsCollapseState();
      }

      function saveState() {
        localStorage.setItem("etfs", JSON.stringify(etfs));
        localStorage.setItem("currentEtfId", currentEtfId);
      }

      function applyBaseSettingsCollapseState() {
        if (isBaseSettingsCollapsed) {
          baseSettingsContent.classList.add("content-hidden");
          toggleBaseSettingsBtn.classList.add("collapsed");
        } else {
          baseSettingsContent.classList.remove("content-hidden");
          toggleBaseSettingsBtn.classList.remove("collapsed");
        }
      }

      toggleBaseSettingsBtn.addEventListener("click", () => {
        isBaseSettingsCollapsed = !isBaseSettingsCollapsed;
        localStorage.setItem(
          "isBaseSettingsCollapsed",
          isBaseSettingsCollapsed
        );
        applyBaseSettingsCollapseState();
      });

      function renderSelector() {
        selector.innerHTML = "";
        etfs.forEach((etf) => {
          const option = document.createElement("option");
          option.value = etf.id;
          option.textContent = etf.name;
          if (etf.id === currentEtfId) option.selected = true;
          selector.appendChild(option);
        });
      }

      function getAutoFetchType(etfName) {
        for (const [key, val] of Object.entries(etfIndexMapping)) {
          if (etfName.includes(key)) return val;
        }
        return null;
      }

      function loadCurrentEtf() {
        const etf = etfs.find((e) => e.id === currentEtfId) || etfs[0];
        baseIndexInput.value = etf.baseIndex || "";
        baseNavInput.value = etf.baseNav || "";
        targetIndexInput.value = "";
        resetResult();
        calculate();

        // 判斷是否需要自動帶入
        const mappedIndex = getAutoFetchType(etf.name);
        if (mappedIndex) {
          fetchAndCalculate(mappedIndex);
        } else {
          quickFetch.value = "";
        }
      }

      function resetResult() {
        resultNav.innerHTML = `0.00 <span class="percent-change">(0.00%)</span>`;
        resultNav.className = "result-value";
      }

      function calculate() {
        const etf = etfs.find((e) => e.id === currentEtfId);
        const baseIndex = parseFloat(baseIndexInput.value);
        const baseNav = parseFloat(baseNavInput.value);
        const targetIndex = parseFloat(targetIndexInput.value);

        if (baseIndex && baseNav && targetIndex && etf) {
          const returnRate = (targetIndex - baseIndex) / baseIndex;
          const percentChange = returnRate * etf.multiplier * 100;
          const estimatedNav = baseNav * (1 + returnRate * etf.multiplier);
          const decimalPlaces = estimatedNav < 10 ? 4 : 2;
          const sign = percentChange > 0 ? "+" : "";

          resultNav.innerHTML = `${estimatedNav.toFixed(
            decimalPlaces
          )} <span class="percent-change">(${sign}${percentChange.toFixed(
            2
          )}%)</span>`;

          resultNav.className = "result-value";
          if (percentChange > 0) resultNav.classList.add("is-up");
          else if (percentChange < 0) resultNav.classList.add("is-down");
        } else {
          resetResult();
        }
      }

      selector.addEventListener("change", (e) => {
        currentEtfId = e.target.value;
        saveState();
        loadCurrentEtf();
      });

      saveBaseBtn.addEventListener("click", () => {
        const etfIndex = etfs.findIndex((e) => e.id === currentEtfId);
        if (etfIndex !== -1) {
          etfs[etfIndex].baseIndex = parseFloat(baseIndexInput.value);
          etfs[etfIndex].baseNav = parseFloat(baseNavInput.value);
          saveState();
          calculate();

          const originalText = saveBaseBtn.textContent;
          saveBaseBtn.textContent = "已儲存";
          saveBaseBtn.classList.add("btn-saved");
          saveBaseBtn.disabled = true;

          setTimeout(() => {
            saveBaseBtn.textContent = originalText;
            saveBaseBtn.classList.remove("btn-saved");
            saveBaseBtn.disabled = false;
          }, 1500);
        }
      });

      targetIndexInput.addEventListener("input", calculate);

      let tempFetchValue = "";

      quickFetch.addEventListener("mousedown", function () {
        if (this.value !== "") tempFetchValue = this.value;
        this.value = "";
      });
      quickFetch.addEventListener("touchstart", function () {
        if (this.value !== "") tempFetchValue = this.value;
        this.value = "";
      });
      quickFetch.addEventListener("focus", function () {
        if (this.value !== "") tempFetchValue = this.value;
        this.value = "";
      });

      quickFetch.addEventListener("blur", function () {
        if (this.value === "") {
          this.value = tempFetchValue;
        }
      });

      // 將原本的抓取邏輯獨立成一個非同步函式，以便於不同地方呼叫
      async function fetchAndCalculate(type) {
        if (!type) return;

        tempFetchValue = type;
        quickFetch.value = type;

        if (GOOGLE_SHEET_CSV_URL.includes("請將您的試算表")) {
          alert("請先在程式碼上方填入您的 Google 試算表 CSV 網址！");
          quickFetch.value = "";
          return;
        }

        const originalPlaceholder = targetIndexInput.placeholder;
        targetIndexInput.placeholder = "讀取中";
        targetIndexInput.value = "";
        quickFetch.style.pointerEvents = "none";
        quickFetch.style.opacity = "0.6";

        try {
          await new Promise((resolve) => setTimeout(resolve, 400));

          const fetchUrl = GOOGLE_SHEET_CSV_URL + "&_t=" + new Date().getTime();
          const response = await fetch(fetchUrl, {
            cache: "no-store",
          });
          if (!response.ok) throw new Error("無法讀取試算表");

          const csvText = await response.text();
          const rows = csvText.split("\n");

          let foundPrice = null;
          for (let row of rows) {
            const cols = row.split(",");
            if (cols.length >= 2 && cols[0].trim() === type) {
              foundPrice = parseFloat(cols[1].trim());
              break;
            }
          }

          if (foundPrice && !isNaN(foundPrice)) {
            targetIndexInput.value = foundPrice;
            calculate();
          } else {
            alert(
              `在試算表中找不到代號「${type}」的數值，請確認 A 欄代號是否完全一致。`
            );
          }
        } catch (error) {
          alert("讀取失敗，請確認試算表已正確發布為 CSV 且網址無誤。");
        } finally {
          targetIndexInput.placeholder = originalPlaceholder;
          quickFetch.style.pointerEvents = "auto";
          quickFetch.style.opacity = "1";
          quickFetch.value = tempFetchValue;
        }
      }

      quickFetch.addEventListener("change", (e) => {
        const type = e.target.value;
        if (!type) {
          e.target.value = tempFetchValue;
          return;
        }
        fetchAndCalculate(type);
      });

      addBtn.addEventListener("click", () => {
        const name = prompt("請輸入 ETF 名稱 (例如: 00632R)");
        if (!name) return;
        const multiplierStr = prompt(
          "請輸入此 ETF 的追蹤倍數（正2輸入 2，反1輸入 -1，原型輸入 1）",
          "1"
        );
        const multiplier = parseFloat(multiplierStr);

        if (name && !isNaN(multiplier)) {
          const newEtf = {
            id: Date.now().toString(),
            name: `${name} (${multiplier > 0 ? "正" : "反"}${Math.abs(
              multiplier
            )})`,
            multiplier: multiplier,
            baseIndex: "",
            baseNav: "",
          };
          etfs.push(newEtf);
          currentEtfId = newEtf.id;
          saveState();
          renderSelector();
          loadCurrentEtf();
        }
      });

      deleteBtn.addEventListener("click", () => {
        if (etfs.length <= 1) return;
        const currentEtf = etfs.find((e) => e.id === currentEtfId);
        if (confirm(`確定要移除「${currentEtf.name}」嗎？`)) {
          etfs = etfs.filter((e) => e.id !== currentEtfId);
          currentEtfId = etfs[0].id;
          saveState();
          renderSelector();
          loadCurrentEtf();
        }
      });

      init();
    </script>
  </body>
</html>
